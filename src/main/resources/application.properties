# ==========================
# APPLICATION CONFIG
# ==========================
spring.application.name=inventory
server.port=8080
server.servlet.context-path=/api

# ==========================
# DATABASE CONNECTION (Supabase)
# ==========================
# Mapeado via IntelliJ (Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# ==========================
# JPA / HIBERNATE SETTINGS
# ==========================
# Dialeto específico para PostgreSQL no Supabase
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ddl-auto=update: Cria/Atualiza tabelas automaticamente com base nas suas @Entity
spring.jpa.hibernate.ddl-auto=update

# Logs de SQL (Útil para debug no seu IntelliJ)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true